<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <article data-testid="test-todo-card" id="todo-card">
      <div class="card-header">
        <div class="checkbox-wrap">
          <label
            for="complete-toggle"
            class="sr-only"
            style="
              position: absolute;
              width: 1px;
              height: 1px;
              overflow: hidden;
              clip: rect(0, 0, 0, 0);
            "
            >Mark task as complete</label
          >
          <input
            type="checkbox"
            id="complete-toggle"
            data-testid="test-todo-complete-toggle"
            aria-label="Mark task as complete"
          />
        </div>
        <div class="title-block">
          <h2 data-testid="test-todo-title">Redesign the onboarding flow</h2>
          <p data-testid="test-todo-description">
            Update the sign-up screens to match the new design system and reduce
            drop-off on step 3.
          </p>
        </div>
      </div>

      <div class="meta-row">
        <span
          data-testid="test-todo-priority"
          class="med"
          aria-label="Priority: Medium"
          >Medium</span
        >
        <span
          data-testid="test-todo-status"
          id="status-badge"
          aria-label="Status: In Progress"
          >In Progress</span
        >
      </div>

      <div class="date-row">
        <time data-testid="test-todo-due-date" datetime="2026-04-16T18:00:00Z"
          >Due Apr 16, 2026</time
        >
        <time
          data-testid="test-todo-time-remaining"
          id="time-remaining"
          aria-live="polite"
        ></time>
      </div>

      <ul data-testid="test-todo-tags" role="list" aria-label="Tags">
        <li data-testid="test-todo-tag-work">work</li>
        <li data-testid="test-todo-tag-urgent">urgent</li>
        <li>design</li>
      </ul>

      <div class="actions">
        <button data-testid="test-todo-edit-button" aria-label="Edit task">
          Edit
        </button>
        <button data-testid="test-todo-delete-button" aria-label="Delete task">
          Delete
        </button>
      </div>
    </article>

    <script src="main.js"></script>
  </body>
</html>
